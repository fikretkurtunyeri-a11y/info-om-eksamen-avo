    ]},
    {title:"Del 3 – Formalia",items:[
      {grade:"2",label:"Karakter 2",desc:"<strong>Ord og uttrykk:</strong> Enkelt, grunnleggende ordforråd. Feil i ordvalg kan forstyrre kommunikasjonen.<br><strong>Setningsstruktur og syntaks:</strong> Bruker noen setningsstrukturer som gir mening. Viser noen tegn på forståelse for syntaks. Ufullstendige setninger kan forekomme hyppig. Tegnsettingen støtter setningsstrukturen i mindre grad.<br><strong>Sammenheng og tekstbinding:</strong> Noe flyt og sammenheng, blant annet ved enkel bruk av tekstbinding.<br><strong>Staving og ordformer:</strong> Viser noe kjennskap til rettskriving og ordformer/bøyinger. Feil kan forstyrre kommunikasjonen."},
      {grade:"4",label:"Karakter 4",desc:"<strong>Ord og uttrykk:</strong> Generelt ordforråd, med en del bruk av passende idiomatiske ord og uttrykk. Feil i ordvalg kan forekomme uten å forstyrre kommunikasjonen vesentlig.<br><strong>Setningsstruktur og syntaks:</strong> Viss variasjon i setningsstrukturer. Setningene har jevnt over korrekt syntaks og er som regel fullstendige. Tegnsettingen støtter som regel setningsstrukturen.<br><strong>Sammenheng og tekstbinding:</strong> Flyt og sammenheng er jevnt over oppnådd, blant annet ved bruk av vanlige bindeord og andre former for tekstbinding.<br><strong>Staving og ordformer:</strong> Kan inneholde enkelte feil i rettskriving og ordformer/bøyinger, men disse er sjelden forstyrrende for kommunikasjonen."},
      {grade:"6",label:"Karakter 6",desc:"<strong>Ord og uttrykk:</strong> Bredt, nyansert og variert ordforråd, med bruk av passende idiomatiske ord og uttrykk. Enkelte feil i ordvalg kan forekomme uten å forstyrre kommunikasjonen.<br><strong>Setningsstruktur og syntaks:</strong> Variert bruk av setningsstrukturer, både for å passe inn i konteksten og for å oppnå en effekt i tråd med teksttypen. Gjennomgående korrekt syntaks. Tegnsettingen støtter gjennomgående setningsstrukturen.<br><strong>Sammenheng og tekstbinding:</strong> Flyt og sammenheng er oppnådd, blant annet ved gjennomgående bruk av varierte bindeord og andre hensiktsmessige former for tekstbinding.<br><strong>Staving og ordformer:</strong> Gjennomgående god beherskelse av rettskriving og ordformer/bøyinger."}
    ]}
  ],
  tipsTitle:"Tips til eksamen",
  tips:[
    {n:1,title:"Del 1 – Leseforståelse",text:"Les oppgavene nøye. Husk at du kan trykke deg fram og tilbake mellom oppgavene. Hvis du synes at en oppgave er vanskelig, kan du hoppe over den og gjøre en annen oppgave først."},
    {n:2,title:"Del 2 – Videreformidling og tekstsamhandling",text:"Se og lytt til videoen flere ganger. Skriv ned stikkord underveis. Husk at du kan stoppe og starte videoen. Les oppgaven med de tre kulepunktene nøye. Husk at du må svare på alle tre kulepunktene i besvarelsen din."},
    {n:3,title:"Del 3 – Kom i gang med å skrive",text:"Husk å lese oppgaven nøye før du begynner. Hva ber oppgaven deg å svare på? En måte å planlegge teksten din på er å notere stikkord og ideer før du begynner å skrive. Du kan også lage et tankekart – da starter du med temaet og noterer hva du vet om det."},
    {n:4,title:"Planlegg strukturen (Skriveramme)",text:'<p style="margin-bottom:10px">Hvis du skal skrive en tekst med flere avsnitt, er det nyttig å planlegge strukturen. Her ser du et eksempel på en skriveramme. Du kan tilpasse den slik at den passer til oppgaven du skal svare på.</p><table class="skriveramme-table"><tr><th>Del av teksten</th><th>Eksempler på engelsk</th></tr><tr><td><strong>Overskrift</strong><br>Skriv oppgavenummer og velg en passende overskrift.</td><td></td></tr><tr><td><strong>Innledning</strong><br>Hvordan vil du innlede teksten?</td><td class="eng-example">This text will discuss…<br>The topic for this text is…<br>There are many different opinions about…<br>I believe that…</td></tr><tr><td><strong>Hoveddel – Avsnitt 1</strong><br>Hva vil du skrive om først?</td><td class="eng-example">First of all…<br>To begin with…<br>Firstly, I will…</td></tr><tr><td><strong>Hoveddel – Avsnitt 2</strong><br>Hva er neste poeng?</td><td class="eng-example">Another point is…<br>In addition…<br>Secondly…</td></tr><tr><td><strong>Hoveddel – Avsnitt 3</strong><br>Har du flere poeng?</td><td class="eng-example">Finally…<br>The last reason is…<br>Another example is…</td></tr><tr><td><strong>Avslutning</strong><br>Hvordan vil du avslutte teksten?</td><td class="eng-example">In conclusion…<br>To sum up…<br>In summary…</td></tr></table>'},
    {n:5,title:"Revidere teksten",text:"Det er lurt å stoppe opp underveis mens du skriver, og lese over teksten. Still deg selv disse spørsmålene:<br>1. Har teksten en overskrift og en innledning?<br>2. Er teksten delt inn i avsnitt? Holder du deg hovedsakelig til ett tema per avsnitt?<br>3. Er det en god sammenheng i teksten?<br>4. Hvordan innledes avsnittene og setningene? Bruker du tekstbindere?<br>5. Har teksten en avslutning?"},
    {n:6,title:"Bindeord (Linking Words)",text:'<p style="margin-bottom:10px">Det kan være lurt å variere bruken av bindeord. Her er noen eksempler:</p><table class="bindeord-table"><tr><th>Norsk</th><th>English</th><th>Forklaring</th></tr><tr><td>tillegg</td><td>and, also, as well as, besides, further</td><td>addition</td></tr><tr><td>sammenlign</td><td>in comparison, just as, similarly, likewise, on the contrary, unlike, on the other hand</td><td>compare</td></tr><tr><td>kontrast</td><td>but, however, in contrast to, in spite of, alternatively, although</td><td>contrast</td></tr><tr><td>rekkefølge</td><td>first/firstly, second/secondly, afterwards, then, finally</td><td>sequence</td></tr><tr><td>på grunn av</td><td>because, for, due to, in order to, so that</td><td>reason</td></tr><tr><td>konklusjon</td><td>to conclude, in brief, so, therefore, to sum up</td><td>conclusion</td></tr><tr><td>eksempel</td><td>for example, for instance, such as, like, to illustrate</td><td>example</td></tr></table>'},
    {n:7,title:"Verb i eksamensoppgaver",text:'Her er noen vanlige verb og begreper som brukes i eksamensoppgaver:<br><br><strong>describe</strong> (beskrive) – Å fortelle om en opplevelse, situasjon eller faglig emne.<br><strong>evaluate / consider</strong> (vurdere) – Å overveie ulike sider ved et saksforhold. Resulterer ofte i en konklusjon.<br><strong>explore</strong> (utforske) – Å undersøke ulike sider av en sak gjennom åpen og kritisk drøfting.<br><strong>reflect (on)</strong> (reflektere over) – Å undersøke og tenke gjennom ulike sider ved handlinger, holdninger og ideer.<br><strong>discuss</strong> (diskutere/drøfte) – Å belyse en sak fra flere sider og veie argumenter for og imot.'}
  ],
  faqTitle:"Vanlige spørsmål",
  faqs:[
    {q:"Hva er forskjellen mellom eksamen og tentamen?",a:"Tentamen er en øvingseksamen. Den ligner på den ekte eksamen, men karakteren teller IKKE. Eksamen er den offisielle prøven der karakteren din teller."},
    {q:"Hva er forberedelsesdagen?",a:"Forberedelsesdagen er en skoledag før eksamen. Forberedelsesmaterialet er tilgjengelig fra kl. 09:00. Du kan samarbeide, ta notater og øve. Du kan ta med notatene på eksamensdagen, men de er ikke en del av eksamensssvaret ditt."},
    {q:"Trenger jeg hodetelefoner?",a:"Ja. I Del 2 skal du se og høre en video. Hodetelefoner er påkrevd."},
    {q:"Kan jeg bruke Google Translate?",a:"Nei. Det er ikke lov å bruke oversettelsesprogrammer under eksamen."},
    {q:"Kan jeg bruke AI (f.eks. ChatGPT)?",a:"Nei. Det er ikke lov å bruke kunstig intelligens til å generere innhold i svaret ditt."},
    {q:"Kan jeg bruke ordbok?",a:"Ja. Du kan bruke ordbøker og hjelpemidler som ikke krever internett."},
    {q:"Hvem retter eksamen?",a:"To sensorer vurderer besvarelsen din (Del 2 og Del 3). Del 1 rettes automatisk av systemet."},
    {q:"Hva skjer hvis sensorene ser stor variasjon i skrivestilen?",a:"Hvis deler av besvarelsen ser ut til å ikke være skrevet av deg, kan sensorene vurdere besvarelsen annerledes. Det er viktig at alt du leverer er ditt eget arbeid."},
    {q:"Hvor mange ord i Del 2?",a:"Du bør skrive ca. 150 ord."},
    {q:"Hvor mange ord i Del 3?",a:"Du bør skrive ca. 300–700 ord."},
    {q:"Kan jeg velge oppgave i Del 3?",a:"Ja. Du velger én av tre oppgaver: A, B eller C."},
    {q:"Hvordan leverer jeg eksamen?",a:"Svarene lagres automatisk. Klikk på «LEVER» og deretter «AVSLUTT OG LEVER»."},
    {q:"Må jeg svare på alle tre kulepunktene i Del 2?",a:"Ja! Du MÅ svare på alle tre kulepunktene. Hvis du bare svarer på noen av dem, viser du ikke full kompetanse."},
    {q:"Hva betyr det å videreformidle i Del 2?",a:"Å videreformidle betyr å gjengi eller oppsummere informasjon og innhold fra det du har sett eller hørt (videoen), med dine egne ord."},
    {q:"Kan jeg ta med notater fra forberedelsesdagen?",a:"Ja. Du kan ta med notatene dine, men de er IKKE en del av eksamensssvaret ditt. De er kun til hjelp for deg selv."},
    {q:"Hva skjer hvis jeg ikke rekker å svare på alt?",a:"Det er viktig å planlegge tiden godt. For å oppnå høyere enn karakteren 1, må du vise kompetanse i alle tre delene. Følg anbefalt tidsbruk: Del 1 ca. 1,5 time, Del 2 ca. 1,5 time, Del 3 ca. 2 timer."},
    {q:"Hva betyr det at Del 1 rettes automatisk?",a:"Det betyr at svarene dine i Del 1 (leseoppgavene) blir sjekket av et datasystem, ikke av sensorene. Sensorene bruker resultatet som grunnlag for karaktersettingen."},
    {q:"Må jeg oppgi kilder?",a:"Ja. Hvis du bruker kilder, må du oppgi dem slik at sensorene kan finne dem. Skriv forfatter og tittel, eller nettadresse og dato. Eksamenssvaret ditt sjekkes for plagiat."},
    {q:"Hva er forskjellen mellom describe, discuss og reflect?",a:"<strong>Describe</strong> = beskriv, fortell om noe. <strong>Discuss</strong> = drøft, belyse en sak fra flere sider. <strong>Reflect</strong> = reflekter, tenk gjennom og vis innsikt i egne tanker og holdninger."}
  ]
},
en:{
  langName:"English",dir:"ltr",
  heroTitle:"ENGV010 – Exam & Trial Exam",
  heroDesc:"Important information about the exam and trial exam (tentamen) for ENGV010 English Module 4.",
  tabInfo:"📋 About Exam",tabPrep:"📅 Prep Day",tabRules:"⚠️ Rules",tabGrades:"🎯 Grades",tabTips:"💡 Tips",tabFaq:"❓ FAQ",
  overviewTitle:"Exam Overview",
  ovDuration:"5 hrs",ovDurationLabel:"Total",ovD1:"Part 1",ovD1Label:"30% · 1.5h",ovD2:"Part 2",ovD2Label:"30% · 1.5h",ovD3:"Part 3",ovD3Label:"40% · 2h",
  p1Title:"Part 1 – Reading Comprehension",p1Time:"Approx. 1.5 hours",p1Weight:"30%",
  p1Desc:"Part 1 tests your reading skills and consists of several reading tasks. You do <strong>NOT</strong> write answers yourself. You answer by clicking on answer choices, clicking on words in the text, or dragging paragraphs into the correct order. Several tasks are related to the preparation topic. Part 1 is marked automatically by the system – the examiners use the result as a basis for grading. There are many tasks in this section so the examiners can assess your reading competence.",
  p2Title:"Part 2 – Relaying and Text Interaction",p2Time:"Approx. 1.5 hours",p2Weight:"30%",
  p2Desc:"Part 2 tests your ability to relay content and interact with a text. This part is related to the preparation topic. You will watch and listen to a video – you can pause and restart it. Then you must <strong>briefly relay</strong> the information and content from what you saw/heard, and show that you can express your <strong>own thoughts or opinions</strong>. You should write approx. <strong>150 words</strong>. Remember you MUST answer <strong>all three bullet points</strong>. Part 2 is assessed by two examiners.",
  p3Title:"Part 3 – Written Production",p3Time:"Approx. 2 hours",p3Weight:"40%",
  p3Desc:"Part 3 tests your written production skills. You choose <strong>ONE of three tasks</strong> (A, B, or C). The tasks are related to the preparation topic. You can use information from the preparation material, relevant knowledge from your studies, and your own experiences. You may be asked to discuss, justify claims, interpretations and/or opinions, and reflect on the content. You should write approx. <strong>300–700 words</strong>. Each task has a specific instruction – it is important to answer according to it. Part 3 is assessed by two examiners.",
  prepTitle:"Preparation Day",
  prepIntro:"There is a preparation day before this exam. The preparation material is available from 09:00 on the preparation day. You may bring your notes to the exam.",
  prepItems:[
    {icon:"🤝",title:"Collaborate",desc:"You can work together with other students during preparation time."},
    {icon:"📝",title:"Notes & mind maps",desc:"You can take notes and create mind maps about the topic."},
    {icon:"🤔",title:"Reflect",desc:"Think about what you already know about the topic and your own experiences."},
    {icon:"💻",title:"Practice with itslearning",desc:"You can practice with the tasks and materials available on itslearning from your previous work."},
    {icon:"📖",title:"Practice dictionaries",desc:"Practice using dictionaries and other tools."},
    {icon:"✍️",title:"Practice formatting",desc:"Practice creating headings and paragraphs."}
  ],
  prepNote:"The teacher can guide you but not teach during preparation time. It is the competence you show on exam day that is assessed.",
  rulesTitle:"Rules During the Exam",
  allowedTitle:"✅ Allowed",notAllowedTitle:"❌ Not Allowed",
  allowed:["Dictionaries and books (without internet)","Some school-approved online tools","Headphones (required for Part 2)","Your notes from the preparation day"],
  notAllowed:["Translation programs (e.g. Google Translate)","Mobile phone and communication tools","Artificial intelligence (AI) to generate answers","Co-writing software and chat"],
  sourcesTitle:"📌 Sources",
  sourcesDesc:"You must cite the sources you use. Write the author's name and title, or web address and date. There must be a clear distinction between your own ideas and what is borrowed from others. Your answers are checked for plagiarism.",
  deliveryTitle:"📤 Submitting on Exam Day",
  deliveryDesc:"Answers are saved automatically. To submit, click 'LEVER' and then 'AVSLUTT OG LEVER'.",
  gradesTitle:"Grades and Assessment",
  gradeIntro:"Two examiners assess your answers. The grade scale runs from 1 to 6. To achieve higher than grade 1, you must show competence in ALL three parts.",
  gradeScaleLabel:"Grade scale:",
  gradeWarningTitle:"⚠️ Important",
  gradeWarning:"If the examiners notice a large variation in writing style between Part 2 and Part 3 — for example if parts seem not to be written by you — it may affect your assessment.",
  gradeSections:[
    {title:"Part 2 – Content & Formalia",items:[
      {grade:"2",label:"Grade 2",desc:"<strong>Relaying:</strong> Relays information in a simple way. Shows few independent sentences.<br><strong>Text interaction:</strong> Responds briefly and simply. Expresses few own viewpoints. Refers little to what the text says. Little independent work.<br><strong>Text structure:</strong> Somewhat unclear or simple structure. Connections between parts are not always clear.<br><strong>Formalia:</strong> Partly correct spelling, punctuation and word forms."},
      {grade:"4",label:"Grade 4",desc:"<strong>Relaying:</strong> Relays information adequately. Shows moderately independent sentences.<br><strong>Text interaction:</strong> Responds briefly and relevantly. Expresses own viewpoints to some extent. Refers to what the text says to some extent. Somewhat independent work.<br><strong>Text structure:</strong> Mostly logical structure suited to purpose and context. Mostly clear how parts connect.<br><strong>Formalia:</strong> Mostly correct spelling, punctuation and word forms."},
      {grade:"6",label:"Grade 6",desc:"<strong>Relaying:</strong> Relays information very well. Shows largely independent sentences.<br><strong>Text interaction:</strong> Responds briefly and completely. Expresses own viewpoints to a large extent. Refers to what the text says to a large extent. Largely independent work.<br><strong>Text structure:</strong> Logical structure suited to purpose, text type and context. Clearly shows how parts connect.<br><strong>Formalia:</strong> Correct spelling, punctuation and word forms, though minor errors may occur."}
    ]},
    {title:"Part 3 – Content",items:[
      {grade:"2",label:"Grade 2",desc:"<strong>Relevance:</strong> Somewhat relevant. Partly matches theme and instructions. Treats topic mostly at surface level.<br><strong>Independence:</strong> Treats topic in a basic, simple way. Shows little use of sources or uses sources incompletely.<br><strong>Text structure:</strong> Somewhat unclear or simple structure. Connections not always clear."},
      {grade:"4",label:"Grade 4",desc:"<strong>Relevance:</strong> Relevant. Mostly matches theme and instructions. Points are partly elaborated or supported.<br><strong>Independence:</strong> Treats topic in a mostly independent and creative or critical way. Relevant content from sources is somewhat integrated critically.<br><strong>Text structure:</strong> Mostly logical structure suited to purpose and context. Mostly clear how parts connect."},
      {grade:"6",label:"Grade 6",desc:"<strong>Relevance:</strong> Relevant and complete. Consistently matches theme and instructions. Points are well elaborated or supported.<br><strong>Independence:</strong> Treats topic independently and creatively or critically. Relevant content from sources is integrated critically and reliably.<br><strong>Text structure:</strong> Logical structure suited to purpose, text type and context. Clearly shows how parts connect."}
    ]},
    {title:"Part 3 – Formalia",items:[
      {grade:"2",label:"Grade 2",desc:"<strong>Words & expressions:</strong> Basic vocabulary. Errors in word choice may disturb communication.<br><strong>Sentence structure & syntax:</strong> Uses some meaningful sentence structures. Some understanding of syntax. Incomplete sentences may occur frequently. Punctuation supports structure to a lesser degree.<br><strong>Coherence & linking:</strong> Some flow and coherence, including simple use of linking words.<br><strong>Spelling & word forms:</strong> Shows some familiarity with spelling and word forms. Errors may disturb communication."},
      {grade:"4",label:"Grade 4",desc:"<strong>Words & expressions:</strong> General vocabulary with some use of suitable idiomatic expressions. Errors in word choice may occur without significantly disturbing communication.<br><strong>Sentence structure & syntax:</strong> Some variation in sentence structures. Generally correct syntax and complete sentences. Punctuation generally supports structure.<br><strong>Coherence & linking:</strong> Flow and coherence are generally achieved, including use of common linking words and other forms of text cohesion.<br><strong>Spelling & word forms:</strong> May contain minor errors in spelling and word forms, but these rarely disturb communication."},
      {grade:"6",label:"Grade 6",desc:"<strong>Words & expressions:</strong> Wide, nuanced and varied vocabulary with suitable idiomatic expressions. Minor errors may occur without disturbing communication.<br><strong>Sentence structure & syntax:</strong> Varied sentence structures suited to context and text type. Consistently correct syntax. Punctuation consistently supports structure.<br><strong>Coherence & linking:</strong> Flow and coherence achieved through consistent use of varied linking words and other effective text cohesion.<br><strong>Spelling & word forms:</strong> Consistently good command of spelling and word forms."}
    ]}
  ],
  tipsTitle:"Exam Tips",
  tips:[
    {n:1,title:"Part 1 – Reading Comprehension",text:"Read the tasks carefully. Remember that you can click forwards and backwards between the tasks. If you find a task difficult, you can skip it and do another task first."},
    {n:2,title:"Part 2 – Relaying and Text Interaction",text:"Watch and listen to the video several times. Write down key words as you go. Remember that you can stop and start the video. Read the task with the three bullet points carefully. Remember that you must answer all three bullet points in your answer."},
    {n:3,title:"Part 3 – Getting started writing",text:"Remember to read the task carefully before you begin. What does the task ask you to answer? One way to plan your text is to jot down key words and ideas before you start writing. You can also make a mind map – start with the topic and note what you know about it."},
    {n:4,title:"Plan the structure (Writing Frame)",text:'<p style="margin-bottom:10px">If you are writing a text with several paragraphs, it is useful to plan the structure. Here is an example of a writing frame. You can adapt it to suit the task you are answering.</p><table class="skriveramme-table"><tr><th>Part of the text</th><th>Examples in English</th></tr><tr><td><strong>Heading</strong><br>Write the task number and choose a suitable heading.</td><td></td></tr><tr><td><strong>Introduction</strong><br>How will you introduce the text?</td><td class="eng-example">This text will discuss…<br>The topic for this text is…<br>There are many different opinions about…<br>I believe that…</td></tr><tr><td><strong>Main body – Paragraph 1</strong><br>What will you write about first?</td><td class="eng-example">First of all…<br>To begin with…<br>Firstly, I will…</td></tr><tr><td><strong>Main body – Paragraph 2</strong><br>What is the next point?</td><td class="eng-example">Another point is…<br>In addition…<br>Secondly…</td></tr><tr><td><strong>Main body – Paragraph 3</strong><br>Do you have more points?</td><td class="eng-example">Finally…<br>The last reason is…<br>Another example is…</td></tr><tr><td><strong>Conclusion</strong><br>How will you finish the text?</td><td class="eng-example">In conclusion…<br>To sum up…<br>In summary…</td></tr></table>'},
    {n:5,title:"Revising your text",text:"It is a good idea to stop while you are writing and read over your text. Ask yourself these questions:<br>1. Does the text have a heading and an introduction?<br>2. Is the text divided into paragraphs? Do you mainly keep to one topic per paragraph?<br>3. Is there good coherence in the text?<br>4. How do you begin paragraphs and sentences? Do you use linking words?<br>5. Does the text have a conclusion?"},
    {n:6,title:"Linking Words",text:'<p style="margin-bottom:10px">It is useful to vary your use of linking words. Here are some examples:</p><table class="bindeord-table"><tr><th>Category</th><th>English linking words</th></tr><tr><td>Addition</td><td>and, also, as well as, besides, further</td></tr><tr><td>Compare</td><td>in comparison, just as, similarly, likewise, on the contrary, unlike, on the other hand</td></tr><tr><td>Contrast</td><td>but, however, in contrast to, in spite of, alternatively, although</td></tr><tr><td>Sequence</td><td>first/firstly, second/secondly, afterwards, then, finally</td></tr><tr><td>Reason</td><td>because, for, due to, in order to, so that</td></tr><tr><td>Conclusion</td><td>to conclude, in brief, so, therefore, to sum up</td></tr><tr><td>Example</td><td>for example, for instance, such as, like, to illustrate</td></tr></table>'},
    {n:7,title:"Verbs in exam tasks",text:'Here are some common verbs used in exam tasks:<br><br><strong>describe</strong> – To tell about an experience, situation, or subject.<br><strong>evaluate / consider</strong> – To weigh different sides of a matter. Often results in a conclusion.<br><strong>explore</strong> – To investigate different sides of a topic through open and critical discussion.<br><strong>reflect (on)</strong> – To examine and think through different aspects of actions, attitudes and ideas.<br><strong>discuss</strong> – To shed light on a topic from several angles and weigh arguments for and against.'}
  ],
  faqTitle:"Frequently Asked Questions",
  faqs:[
    {q:"What is the difference between the exam and tentamen?",a:"Tentamen is a practice exam. It looks like the real exam but the grade does NOT count. The official exam is where your grade counts."},
    {q:"What is the preparation day?",a:"The preparation day is a school day before the exam. Material is available from 09:00. You can collaborate, take notes and practise. You may bring your notes to the exam, but they are not part of your answer."},
    {q:"Do I need headphones?",a:"Yes. In Part 2 you will watch and listen to a video. Headphones are required."},
    {q:"Can I use Google Translate?",a:"No. You are not allowed to use translation programs during the exam."},
    {q:"Can I use AI (e.g. ChatGPT)?",a:"No. You are not allowed to use artificial intelligence to generate content in your answer."},
    {q:"Can I use a dictionary?",a:"Yes. You can use dictionaries and tools that do not require internet."},
    {q:"Who marks the exam?",a:"Two examiners assess your answers for Part 2 and Part 3. Part 1 is marked automatically."},
    {q:"What if examiners notice my writing style varies a lot?",a:"If parts of your answer seem not to be written by you, the examiners may assess it differently. It is important that everything you submit is your own work."},
    {q:"How many words in Part 2?",a:"Approx. 150 words."},
    {q:"How many words in Part 3?",a:"Approx. 300–700 words."},
    {q:"Can I choose the task in Part 3?",a:"Yes. You choose one of three tasks: A, B, or C."},
    {q:"How do I submit my exam?",a:"Answers are saved automatically. Click 'LEVER' and then 'AVSLUTT OG LEVER'."},
    {q:"Must I answer all three bullet points in Part 2?",a:"Yes! You MUST answer all three bullet points. If you only answer some of them, you do not show full competence."},
    {q:"What does 'relay' mean in Part 2?",a:"To relay means to retell or summarise the information and content from what you saw or heard (the video) in your own words."},
    {q:"Can I bring my notes from the preparation day?",a:"Yes. You can bring your notes, but they are NOT part of your exam answer. They are only to help you."},
    {q:"What happens if I don't have time to finish everything?",a:"It is important to plan your time well. To achieve higher than grade 1, you must show competence in all three parts. Follow the recommended time: Part 1 approx. 1.5 hours, Part 2 approx. 1.5 hours, Part 3 approx. 2 hours."},
    {q:"What does it mean that Part 1 is marked automatically?",a:"It means that your answers in Part 1 (reading tasks) are checked by a computer system, not by the examiners. The examiners use the result as a basis for grading."},
    {q:"Must I cite sources?",a:"Yes. If you use sources, you must cite them so the examiners can find them. Write author and title, or web address and date. Your answer is checked for plagiarism."},
    {q:"What is the difference between describe, discuss and reflect?",a:"<strong>Describe</strong> = tell about something. <strong>Discuss</strong> = examine a topic from several sides. <strong>Reflect</strong> = think through and show insight into your own thoughts and attitudes."}
  ]
},
ar:{

  p3Title:"الجزء 3 – الكتابة",p3Time:"حوالي ساعتين",p3Weight:"40%",
  p3Desc:"الجزء 3 يختبر مهاراتك في الكتابة. اختر <strong>مهمة واحدة من ثلاث</strong> (أ، ب أو ج). المهام مرتبطة بموضوع التحضير. يمكنك استخدام معلومات من مادة التحضير ومعارفك السابقة وتجاربك الشخصية. قد يُطلب منك مناقشة وتبرير ادعاءات والتأمل في المحتوى. اكتب حوالي <strong>300–700 كلمة</strong>. لكل مهمة تعليمات محددة – من المهم الإجابة وفقاً لها. يُقيَّم الجزء 3 من قبل مصححَيْن.",

    {title:"الجزء 2 – المحتوى والشكليات",items:[
      {grade:"2",label:"الدرجة 2",desc:"<strong>نقل المعلومات:</strong> ينقل المعلومات بطريقة بسيطة. جمل مستقلة قليلة.<br><strong>التفاعل مع النص:</strong> يستجيب بشكل قصير وبسيط. يعبّر عن وجهات نظره بدرجة قليلة. يشير إلى ما يقوله النص بدرجة قليلة.<br><strong>بنية النص:</strong> بنية غير واضحة أو بسيطة. الترابط بين الأجزاء ليس واضحاً دائماً.<br><strong>الشكليات:</strong> إملاء وعلامات ترقيم صحيحة جزئياً."},
      {grade:"4",label:"الدرجة 4",desc:"<strong>نقل المعلومات:</strong> ينقل المعلومات بشكل جيد. جمل مستقلة إلى حد ما.<br><strong>التفاعل مع النص:</strong> يستجيب بشكل قصير ومناسب. يعبّر عن وجهات نظره إلى حد ما. يشير إلى النص إلى حد ما.<br><strong>بنية النص:</strong> بنية منطقية في الغالب مناسبة للغرض والسياق.<br><strong>الشكليات:</strong> إملاء وعلامات ترقيم صحيحة في الغالب."},
      {grade:"6",label:"الدرجة 6",desc:"<strong>نقل المعلومات:</strong> ينقل المعلومات بشكل ممتاز. جمل مستقلة بدرجة كبيرة.<br><strong>التفاعل مع النص:</strong> يستجيب بشكل قصير وكامل. يعبّر عن وجهات نظره بدرجة كبيرة. يشير إلى النص بدرجة كبيرة.<br><strong>بنية النص:</strong> بنية منطقية مناسبة للغرض ونوع النص. ترابط واضح بين الأجزاء.<br><strong>الشكليات:</strong> إملاء وعلامات ترقيم صحيحة مع أخطاء بسيطة محتملة."}
    ]},
    {title:"الجزء 3 – المحتوى",items:[
      {grade:"2",label:"الدرجة 2",desc:"<strong>الصلة:</strong> ذو صلة جزئياً. يتوافق جزئياً مع الموضوع والتعليمات. يعالج الموضوع بشكل سطحي.<br><strong>الاستقلالية:</strong> يعالج الموضوع بطريقة أساسية وبسيطة. يشير إلى المصادر بدرجة قليلة أو بشكل غير مكتمل.<br><strong>بنية النص:</strong> بنية غير واضحة أو بسيطة."},
      {grade:"4",label:"الدرجة 4",desc:"<strong>الصلة:</strong> ذو صلة. يتوافق في الغالب مع الموضوع والتعليمات. النقاط مُعمّقة أو مدعومة إلى حد ما.<br><strong>الاستقلالية:</strong> يعالج الموضوع بشكل مستقل وإبداعي أو نقدي في الغالب. محتوى المصادر مدمج بشكل نقدي إلى حد ما.<br><strong>بنية النص:</strong> بنية منطقية في الغالب. ترابط واضح في الغالب."},
      {grade:"6",label:"الدرجة 6",desc:"<strong>الصلة:</strong> ذو صلة وشامل. يتوافق باستمرار مع الموضوع والتعليمات. النقاط مُعمّقة ومدعومة جيداً.<br><strong>الاستقلالية:</strong> يعالج الموضوع بشكل مستقل وإبداعي أو نقدي. محتوى المصادر مدمج بشكل نقدي وموثوق.<br><strong>بنية النص:</strong> بنية منطقية. ترابط واضح."}
    ]},
    {title:"الجزء 3 – الشكليات",items:[
      {grade:"2",label:"الدرجة 2",desc:"<strong>المفردات:</strong> مفردات أساسية بسيطة. أخطاء في اختيار الكلمات قد تعيق التواصل.<br><strong>بنية الجمل:</strong> بعض التراكيب المفيدة. فهم محدود للقواعد. جمل ناقصة متكررة. علامات الترقيم تدعم البنية بدرجة قليلة.<br><strong>التماسك والربط:</strong> بعض التدفق والتماسك بربط بسيط.<br><strong>الإملاء:</strong> بعض المعرفة بالإملاء. أخطاء قد تعيق التواصل."},
      {grade:"4",label:"الدرجة 4",desc:"<strong>المفردات:</strong> مفردات عامة مع بعض التعبيرات الاصطلاحية المناسبة. أخطاء لا تعيق التواصل بشكل كبير.<br><strong>بنية الجمل:</strong> تنوع معقول في التراكيب. قواعد صحيحة في الغالب. علامات الترقيم تدعم البنية في الغالب.<br><strong>التماسك والربط:</strong> تدفق وتماسك جيد باستخدام أدوات ربط شائعة.<br><strong>الإملاء:</strong> أخطاء قليلة نادراً ما تعيق التواصل."},
      {grade:"6",label:"الدرجة 6",desc:"<strong>المفردات:</strong> مفردات واسعة ومتنوعة مع تعبيرات اصطلاحية مناسبة. أخطاء بسيطة لا تعيق التواصل.<br><strong>بنية الجمل:</strong> تراكيب متنوعة مناسبة للسياق. قواعد صحيحة باستمرار. علامات ترقيم داعمة.<br><strong>التماسك والربط:</strong> تدفق وتماسك ممتاز بأدوات ربط متنوعة.<br><strong>الإملاء:</strong> إتقان جيد ومستمر للإملاء وتصريف الكلمات."}
    ]}

  tipsTitle:"نصائح للامتحان",
  tips:[
    {n:1,title:"الجزء 1 – القراءة",text:"اقرأ الأسئلة بعناية. تذكر أنه يمكنك التنقل بين الأسئلة. إذا وجدت سؤالاً صعباً، يمكنك تخطيه والعودة إليه لاحقاً."},
    {n:2,title:"الجزء 2 – نقل المعلومات",text:"شاهد واستمع إلى الفيديو عدة مرات. دوّن الكلمات المفتاحية أثناء المشاهدة. تذكر أنه يمكنك إيقاف الفيديو وتشغيله. اقرأ المهمة مع النقاط الثلاث بعناية. تذكر أنه يجب الإجابة على جميع النقاط الثلاث."},
    {n:3,title:"الجزء 3 – ابدأ الكتابة",text:"اقرأ المهمة بعناية قبل أن تبدأ. ماذا تطلب منك المهمة؟ إحدى طرق تخطيط نصك هي تدوين الكلمات المفتاحية والأفكار قبل البدء. يمكنك أيضاً إنشاء خريطة ذهنية."},
    {n:4,title:"تخطيط الهيكل (إطار الكتابة)",text:'<p style="margin-bottom:10px">إذا كنت ستكتب نصاً من عدة فقرات، فمن المفيد تخطيط الهيكل:</p><table class="skriveramme-table"><tr><th>جزء النص</th><th>أمثلة بالإنجليزية</th></tr><tr><td><strong>العنوان</strong></td><td></td></tr><tr><td><strong>المقدمة</strong></td><td class="eng-example">This text will discuss…<br>The topic for this text is…<br>There are many different opinions about…<br>I believe that…</td></tr><tr><td><strong>الجسم – الفقرة 1</strong></td><td class="eng-example">First of all…<br>To begin with…<br>Firstly, I will…</td></tr><tr><td><strong>الجسم – الفقرة 2</strong></td><td class="eng-example">Another point is…<br>In addition…<br>Secondly…</td></tr><tr><td><strong>الجسم – الفقرة 3</strong></td><td class="eng-example">Finally…<br>The last reason is…<br>Another example is…</td></tr><tr><td><strong>الخاتمة</strong></td><td class="eng-example">In conclusion…<br>To sum up…<br>In summary…</td></tr></table>'},
    {n:5,title:"مراجعة النص",text:"من الجيد التوقف أثناء الكتابة وإعادة قراءة النص:<br>1. هل يحتوي النص على عنوان ومقدمة؟<br>2. هل النص مقسم إلى فقرات؟<br>3. هل هناك تماسك جيد في النص؟<br>4. هل تستخدم أدوات الربط؟<br>5. هل يحتوي النص على خاتمة؟"},
    {n:6,title:"أدوات الربط (Linking Words)",text:'<p style="margin-bottom:10px">من المفيد تنويع استخدام أدوات الربط:</p><table class="bindeord-table"><tr><th>الفئة</th><th>أدوات الربط بالإنجليزية</th></tr><tr><td>إضافة</td><td>and, also, as well as, besides, further</td></tr><tr><td>مقارنة</td><td>in comparison, just as, similarly, likewise, on the contrary, unlike, on the other hand</td></tr><tr><td>تباين</td><td>but, however, in contrast to, in spite of, alternatively, although</td></tr><tr><td>تسلسل</td><td>first/firstly, second/secondly, afterwards, then, finally</td></tr><tr><td>سبب</td><td>because, for, due to, in order to, so that</td></tr><tr><td>استنتاج</td><td>to conclude, in brief, so, therefore, to sum up</td></tr><tr><td>مثال</td><td>for example, for instance, such as, like, to illustrate</td></tr></table>'},
    {n:7,title:"أفعال في أسئلة الامتحان",text:'إليك بعض الأفعال الشائعة في أسئلة الامتحان:<br><br><strong>describe</strong> (وصف) – الإخبار عن تجربة أو موقف أو موضوع.<br><strong>evaluate / consider</strong> (تقييم) – النظر في جوانب مختلفة.<br><strong>explore</strong> (استكشاف) – دراسة جوانب مختلفة بنقاش مفتوح.<br><strong>reflect (on)</strong> (التأمل) – التفكير في جوانب مختلفة من الأفعال والأفكار.<br><strong>discuss</strong> (مناقشة) – تسليط الضوء على موضوع من عدة زوايا.'}
  ],
  faqTitle:"أسئلة شائعة",
  faqs:[

    {q:"ما هو يوم التحضير؟",a:"يوم التحضير يوم مدرسي قبل الامتحان. المواد متاحة من الساعة 09:00. يمكنك التعاون وأخذ ملاحظات والتدرب. يمكنك إحضار ملاحظاتك للامتحان لكنها ليست جزءاً من إجابتك."},
    {q:"هل أحتاج إلى سماعات؟",a:"نعم. في الجزء 2 ستشاهد وتسمع فيديو. السماعات ضرورية."},
    {q:"هل يمكنني استخدام Google Translate؟",a:"لا. غير مسموح باستخدام برامج الترجمة في الامتحان."},
    {q:"هل يمكنني استخدام الذكاء الاصطناعي؟",a:"لا. غير مسموح باستخدام AI لإنشاء محتوى في إجابتك."},
    {q:"هل يمكنني استخدام القاموس؟",a:"نعم. يمكنك استخدام القواميس والأدوات التي لا تحتاج إنترنت."},
    {q:"من يصحح الامتحان؟",a:"مصححان اثنان يقيّمان إجاباتك (الجزء 2 والجزء 3). الجزء 1 يُصحَّح تلقائياً."},
    {q:"ماذا يحدث إذا لاحظ المصححون تبايناً في أسلوب الكتابة؟",a:"إذا بدت أجزاء من إجاباتك لم تُكتب بنفسك، قد يؤثر ذلك على تقييمك. يجب أن يكون كل ما تسلّمه من عملك الخاص."},
    {q:"كم عدد الكلمات في الجزء 2؟",a:"حوالي 150 كلمة."},
    {q:"كم عدد الكلمات في الجزء 3؟",a:"حوالي 300–700 كلمة."},
    {q:"هل يمكنني اختيار مهمة الجزء 3؟",a:"نعم. اختر مهمة واحدة من ثلاث: أ، ب، أو ج."},
    {q:"كيف أسلّم الامتحان؟",a:"تُحفظ إجاباتك تلقائياً. انقر على «LEVER» ثم «AVSLUTT OG LEVER»."}

  prepNote:"Mwalimu anaweza kukuongoza lakini hawezi kufundisha wakati wa maandalizi. Uwezo unaoonyesha siku ya mtihani ndio unaopimwa.",

  notAllowed:["Programu za kutafsiri (Google Translate)","Simu ya mkononi na zana za mawasiliano","AI kuunda majibu","Zana za uandishi wa pamoja na mazungumzo"],
  sourcesTitle:"📌 Vyanzo",
  sourcesDesc:"Lazima utaje vyanzo unavyotumia. Andika jina la mwandishi na kichwa, au anwani ya wavuti na tarehe. Lazima kuwe na tofauti wazi kati ya mawazo yako na uliokopwa. Majibu yanakaguliwa kwa wizi.",
  deliveryTitle:"📤 Kuwasilisha Siku ya Mtihani",
  deliveryDesc:"Majibu huhifadhiwa kiotomatiki. Ili kuwasilisha, bonyeza «LEVER» kisha «AVSLUTT OG LEVER».",
  gradesTitle:"Daraja na Tathmini",
  gradeIntro:"Wapima wawili hutathimini majibu yako. Kiwango cha daraja ni 1 hadi 6. Kupata zaidi ya 1, lazima uonyeshe uwezo katika sehemu ZOTE tatu.",
  gradeScaleLabel:"Kiwango cha daraja:",
  gradeWarningTitle:"⚠️ Muhimu",
  gradeWarning:"Ikiwa wapima wanaona tofauti kubwa katika mtindo wa uandishi kati ya Sehemu ya 2 na ya 3 – kwa mfano sehemu zinaonekana hazikuandikwa na wewe – inaweza kuathiri tathmini yako.",
  gradeSections:[
    {title:"Sehemu ya 2 – Yaliyomo na Rasmi",items:[
      {grade:"2",label:"Daraja 2",desc:"<strong>Upitishaji:</strong> Inapitisha habari kwa njia rahisi. Sentensi huru chache.<br><strong>Mwingiliano:</strong> Inajibu kwa ufupi na kwa urahisi. Maoni binafsi kidogo. Inarejelea kidogo maandishi.<br><strong>Muundo:</strong> Muundo rahisi au usio wazi. Uhusiano kati ya sehemu si wazi kila wakati.<br><strong>Rasmi:</strong> Tahajia na alama sahihi kwa kiasi."},
      {grade:"4",label:"Daraja 4",desc:"<strong>Upitishaji:</strong> Inapitisha habari vizuri kiasi. Sentensi huru kiasi.<br><strong>Mwingiliano:</strong> Inajibu kwa ufupi na kwa umuhimu. Inaeleza maoni kwa kiasi. Inarejelea maandishi kwa kiasi.<br><strong>Muundo:</strong> Muundo wa kimantiki kwa ujumla. Uhusiano wazi kwa kiasi.<br><strong>Rasmi:</strong> Tahajia na alama sahihi kwa ujumla."},
      {grade:"6",label:"Daraja 6",desc:"<strong>Upitishaji:</strong> Inapitisha habari vizuri sana. Sentensi huru nyingi.<br><strong>Mwingiliano:</strong> Inajibu kwa ukamilifu. Inaeleza maoni mengi. Inarejelea maandishi kwa kiwango kikubwa.<br><strong>Muundo:</strong> Muundo wa kimantiki unaofaa. Uhusiano wazi kati ya sehemu.<br><strong>Rasmi:</strong> Tahajia na alama sahihi, makosa madogo yanaweza kutokea."}
    ]},
    {title:"Sehemu ya 3 – Yaliyomo",items:[
      {grade:"2",label:"Daraja 2",desc:"<strong>Uhusiano:</strong> Ina uhusiano kidogo. Inashughulikia mada kwa njia ya juu.<br><strong>Uhuru:</strong> Inashughulikia kwa njia rahisi. Vyanzo vinatajwa kidogo.<br><strong>Muundo:</strong> Muundo rahisi au usio wazi."},
      {grade:"4",label:"Daraja 4",desc:"<strong>Uhusiano:</strong> Ina uhusiano. Hoja zimefafanuliwa kiasi.<br><strong>Uhuru:</strong> Inashughulikia kwa uhuru na ubunifu kiasi. Vyanzo vimeunganishwa kiasi.<br><strong>Muundo:</strong> Muundo wa kimantiki kwa ujumla."},
      {grade:"6",label:"Daraja 6",desc:"<strong>Uhusiano:</strong> Ina uhusiano na ukamilifu. Hoja zimefafanuliwa vizuri.<br><strong>Uhuru:</strong> Inashughulikia kwa uhuru na ukosoaji. Vyanzo vimeunganishwa vizuri.<br><strong>Muundo:</strong> Muundo wa kimantiki unaofaa."}
    ]},
    {title:"Sehemu ya 3 – Rasmi",items:[
      {grade:"2",label:"Daraja 2",desc:"<strong>Msamiati:</strong> Msamiati wa msingi. Makosa yanaweza kusumbua mawasiliano.<br><strong>Miundo ya sentensi:</strong> Miundo michache yenye maana. Sentensi zisizo kamili zinaweza kutokea mara kwa mara.<br><strong>Mshikamano:</strong> Mtiririko kidogo na maneno ya kuunganisha rahisi.<br><strong>Tahajia:</strong> Ujuzi kidogo wa tahajia. Makosa yanaweza kusumbua."},
      {grade:"4",label:"Daraja 4",desc:"<strong>Msamiati:</strong> Msamiati wa kawaida na misemo inayofaa. Makosa hayasumbui sana.<br><strong>Miundo ya sentensi:</strong> Utofauti fulani. Sintaksia sahihi kwa ujumla. Alama zinaunga mkono muundo.<br><strong>Mshikamano:</strong> Mtiririko mzuri na maneno ya kuunganisha ya kawaida.<br><strong>Tahajia:</strong> Makosa machache ambayo hayasumbui."},
      {grade:"6",label:"Daraja 6",desc:"<strong>Msamiati:</strong> Msamiati mpana na wa aina mbalimbali. Makosa madogo hayasumbui.<br><strong>Miundo ya sentensi:</strong> Miundo mbalimbali inayofaa. Sintaksia sahihi kwa ujumla. Alama zinaunga mkono muundo.<br><strong>Mshikamano:</strong> Mtiririko na mshikamano bora kwa maneno ya kuunganisha mbalimbali.<br><strong>Tahajia:</strong> Ujuzi mzuri wa tahajia na maumbo ya maneno."}
    ]}
  ],
  tipsTitle:"Vidokezo vya Mtihani",
  tips:[
    {n:1,title:"Sehemu 1 – Kusoma",text:"Soma maswali kwa makini. Kumbuka unaweza kwenda mbele na kurudi nyuma kati ya maswali. Ikiwa swali ni gumu, ruka na urudi baadaye."},
    {n:2,title:"Sehemu 2 – Upitishaji",text:"Tazama na sikiliza video mara kadhaa. Andika maneno muhimu. Kumbuka unaweza kusimamisha na kuendelea video. Soma kazi na pointi tatu kwa makini. Jibu pointi ZOTE tatu."},
    {n:3,title:"Sehemu 3 – Anza kuandika",text:"Soma kazi kwa makini kabla ya kuanza. Kazi inakuomba nini? Njia moja ya kupanga maandishi yako ni kuandika maneno muhimu na mawazo kabla ya kuanza. Unaweza pia kuunda ramani ya akili."},
    {n:4,title:"Panga muundo (Muundo wa Uandishi)",text:'<p style="margin-bottom:10px">Ikiwa unaandika maandishi yenye aya kadhaa, ni muhimu kupanga muundo:</p><table class="skriveramme-table"><tr><th>Sehemu ya maandishi</th><th>Mifano kwa Kiingereza</th></tr><tr><td><strong>Kichwa</strong></td><td></td></tr><tr><td><strong>Utangulizi</strong></td><td class="eng-example">This text will discuss…<br>The topic for this text is…<br>There are many different opinions about…<br>I believe that…</td></tr><tr><td><strong>Mwili – Aya ya 1</strong></td><td class="eng-example">First of all…<br>To begin with…<br>Firstly, I will…</td></tr><tr><td><strong>Mwili – Aya ya 2</strong></td><td class="eng-example">Another point is…<br>In addition…<br>Secondly…</td></tr><tr><td><strong>Mwili – Aya ya 3</strong></td><td class="eng-example">Finally…<br>The last reason is…<br>Another example is…</td></tr><tr><td><strong>Hitimisho</strong></td><td class="eng-example">In conclusion…<br>To sum up…<br>In summary…</td></tr></table>'},
    {n:5,title:"Kuhariri Maandishi",text:"Ni vizuri kusimama unapoandika na kusoma tena:<br>1. Je, maandishi yana kichwa na utangulizi?<br>2. Je, yamegawanywa katika aya?<br>3. Je, kuna mshikamano mzuri?<br>4. Je, unatumia maneno ya kuunganisha?<br>5. Je, yana hitimisho?"},
    {n:6,title:"Maneno ya Kuunganisha (Linking Words)",text:'<p style="margin-bottom:10px">Ni vizuri kutofautisha matumizi ya maneno ya kuunganisha:</p><table class="bindeord-table"><tr><th>Aina</th><th>Maneno ya kuunganisha kwa Kiingereza</th></tr><tr><td>Kuongeza</td><td>and, also, as well as, besides, further</td></tr><tr><td>Kulinganisha</td><td>in comparison, just as, similarly, likewise, on the contrary, unlike, on the other hand</td></tr><tr><td>Utofauti</td><td>but, however, in contrast to, in spite of, alternatively, although</td></tr><tr><td>Mfuatano</td><td>first/firstly, second/secondly, afterwards, then, finally</td></tr><tr><td>Sababu</td><td>because, for, due to, in order to, so that</td></tr><tr><td>Hitimisho</td><td>to conclude, in brief, so, therefore, to sum up</td></tr><tr><td>Mfano</td><td>for example, for instance, such as, like, to illustrate</td></tr></table>'},
    {n:7,title:"Vitenzi katika maswali ya mtihani",text:'Vitenzi vya kawaida:<br><br><strong>describe</strong> (eleza) – Kueleza uzoefu au mada.<br><strong>evaluate</strong> (tathmini) – Kupima pande tofauti.<br><strong>explore</strong> (chunguza) – Kuchunguza kupitia mjadala wazi.<br><strong>reflect</strong> (tafakari) – Kufikiri na kuchunguza pande tofauti.<br><strong>discuss</strong> (jadili) – Kuangazia mada kutoka pande kadhaa.'}
  ],
  faqTitle:"Maswali ya Kawaida",
  faqs:[
    {q:"Tofauti kati ya mtihani na tentamen?",a:"Tentamen ni mtihani wa mazoezi. Unafanana na mtihani wa kweli lakini alama HAZIHESABIWI."},

    {q:"Je, ninaweza kutumia kamusi?",a:"Ndiyo."},
    {q:"Ni nani anayetathmini?",a:"Wapima wawili hutathimini (Sehemu 2 na 3). Sehemu 1 inapitiwa kiotomatiki."},
    {q:"Maneno mangapi Sehemu ya 2?",a:"Takriban maneno 150."},

  ]

  langName:"Kurmancî",dir:"ltr",

  tabInfo:"📋 Ezmûn",tabPrep:"📅 Roja Amadekariyê",tabRules:"⚠️ Rêgez",tabGrades:"🎯 Not",tabTips:"💡 Şîret",tabFaq:"❓ Pirsan",
  overviewTitle:"Nêrîna Giştî ya Ezmûnê",
  ovDuration:"5 saet",ovDurationLabel:"Bi tevahî",ovD1:"Beş 1",ovD1Label:"30%",ovD2:"Beş 2",ovD2Label:"30%",ovD3:"Beş 3",ovD3Label:"40%",
  p1Title:"Beş 1 – Têgihîştina Xwendinê",p1Time:"Nêzîkî 1.5 saet",p1Weight:"30%",
  p1Desc:"Beş 1 şiyana te ya xwendinê diceribîne û ji çend pirsên xwendinê pêk tê. Tu <strong>nanivîsî</strong> – li ser hilbijarkên bersivê bikirtînî, peyvên di nivîsê de bikirtînî, an paragraffan rêz bikin. Gelek pirs bi mijara roja amadekariyê ve girêdayî ne. Beş 1 bixweber tê şirovetin. Pirsên zêde hene ji bo ku nirxanêr bikaribin jêhatîbûna te binirxînin.",
  p2Title:"Beş 2 – Veguhestina Agahiyê",p2Time:"Nêzîkî 1.5 saet",p2Weight:"30%",
  p2Desc:"Beş 2 jêhatîbûna te ya veguhestina naverokê diceribîne. Vîdyoyekê temaşe bike û bibihîze – dikarî rawestîne û ji nû ve dest pê bike. Piştre divê tu <strong>bi kurtî agahî veguhezîne</strong> û nîşan bide ku dikarî <strong>raman û nêrînên xwe</strong> diyar bike. Nêzîkî <strong>150 peyvan</strong> binivîse. Bersivê bide <strong>her sê xalan</strong>. Du nirxanêr Beş 2 dinirxînin.",
  p3Title:"Beş 3 – Hilberîna Nivîskî",p3Time:"Nêzîkî 2 saet",p3Weight:"40%",
  p3Desc:"Beş 3 jêhatîbûna te ya nivîsandinê diceribîne. Ji sê karan (A, B an C) <strong>YEKÊ hilbijêre</strong>. Dikarî agahiyên ji materyalê amadekariyê, zanîna berê û tecrubeên xwe bikar bîne. Dibe ku ji te bê xwestin ku nîqaş bike û refleks bike. Nêzîkî <strong>300–700 peyvan</strong> binivîse. Du nirxanêr Beş 3 dinirxînin.",
  prepTitle:"Roja Amadekariyê",
  prepIntro:"Beriya vê ezmûnê rojek amadekariyê heye. Materyalên amadekariyê ji saet 09:00 peyda ne. Dikarî notên xwe di roja ezmûnê de bîne.",
  prepItems:[
    {icon:"🤝",title:"Hevkarî",desc:"Di dema amadekariyê de dikarî bi xwendekarên din re bixebitî."},
    {icon:"📝",title:"Not û nexşeyên hişî",desc:"Dikarî notên di barê mijarê de bigrî û nexşeyên hişî çêbikî."},
    {icon:"🤔",title:"Ramandin",desc:"Bifikire ka li ser mijarê çi dizanî û tecrubeyen xwe yên kesane."},
    {icon:"💻",title:"Pratîk bi itslearning",desc:"Dikarî bi kar û materyalên ku li ser itslearning ji karê berê hene pratîk bikî."},
    {icon:"📖",title:"Pratîka ferhengan",desc:"Bikaranîna ferhengan û amûrên din pratîk bike."},
    {icon:"✍️",title:"Pratîka formatan",desc:"Çêkirina sernavên û paragraffan pratîk bike."}
  ],
  prepNote:"Mamoste dikare te rênîşan bide lê nikare hîn bike di dema amadekariyê de. Têkiliyek ku di roja ezmûnê de nîşan didî tê nirxandin.",
  rulesTitle:"Rêgezên Ezmûnê",
  allowedTitle:"✅ Destûr heye",notAllowedTitle:"❌ Destûr nîne",
  allowed:["Ferheng û pirtûk (bêyî înternet)","Hin amûrên înternet yên dibistanê destûr kirî","Guhên serê (ji bo Beş 2 pêwist e)","Notên te ji roja amadekariyê"],
  notAllowed:["Bernameên wergêranê (Google Translate)","Telefona desta û amûrên ragihandinê","AI ji bo bersivê","Amûrên nivîsandina hevkar û çet"],
  sourcesTitle:"📌 Çavkanî",
  sourcesDesc:"Divê çavkaniyên ku bikar tînî binivîsî. Navê nivîskar û sernavê, an navnîşana malpera û dîrokê binivîse. Bersivên te ji bo diziya nivîsê tê kontrol kirin.",
  deliveryTitle:"📤 Radestkirina Ezmûnê",
  deliveryDesc:"Bersiv bixweber têne hilînin. Ji bo radestkirinê, «LEVER» bikirtîne û paşê «AVSLUTT OG LEVER».",
  gradesTitle:"Not û Nirxandin",
  gradeIntro:"Du nirxanêr bersivên te dinirxînin. Rêza noten ji 1 heta 6 dimeşe. Ji 1 zêdetir bigirî, divê di her sê beşan de şiyanê nîşan bidî.",
  gradeScaleLabel:"Rêza noten:",
  gradeWarningTitle:"⚠️ Girîng",
  gradeWarning:"Heke nirxanêr di navbera Beş 2 û 3 de cûdahiyeke mezin di şêwaza nivîsandinê de bibînin – wek ku hin beş ne ji aliyê te ve hatibe nivîsandin – dikare bandora nirxandina te bike.",
  gradeSections:[
    {title:"Beş 2 – Naverok û Formalia",items:[
      {grade:"2",label:"Not 2",desc:"<strong>Veguhestin:</strong> Agahî bi awayekî sade vediguhêze. Hindik hevok serbixwe.<br><strong>Têkilî bi nivîsê:</strong> Bi kurtî û sade bersiv dide. Nêrînên xwe hindik diyar dike. Hindik nivîsê nîşan dide.<br><strong>Sêwirandin:</strong> Sêwirana sade an ne diyar. Girêdana beşan her dem diyar nîne.<br><strong>Formalia:</strong> Rastnivîsîn û xalbendî qismî rast."},
      {grade:"4",label:"Not 4",desc:"<strong>Veguhestin:</strong> Agahî bi awayekî navîn baş vediguhêze. Hevok serbixwe heta radeyekê.<br><strong>Têkilî bi nivîsê:</strong> Bi kurtî û têkildar bersiv dide. Nêrînên xwe heta radeyekê diyar dike. Heta radeyekê nivîsê nîşan dide.<br><strong>Sêwirandin:</strong> Bi giştî sêwirana mantiqî. Girêdan bi giştî diyar e.<br><strong>Formalia:</strong> Bi giştî rastnivîsîn û xalbendî rast."},
      {grade:"6",label:"Not 6",desc:"<strong>Veguhestin:</strong> Agahî pir baş vediguhêze. Hevok serbixwe zêde.<br><strong>Têkilî bi nivîsê:</strong> Bi kurtî û bi tevahî bersiv dide. Nêrînên xwe bi rengekî berfereh diyar dike. Nivîsê pir baş nîşan dide.<br><strong>Sêwirandin:</strong> Sêwirana mantiqî û minasib. Girêdan diyar e.<br><strong>Formalia:</strong> Rastnivîsîn û xalbendî rast, çewtiyên piçûk dikarin hebin."}
    ]},
    {title:"Beş 3 – Naverok",items:[
      {grade:"2",label:"Not 2",desc:"<strong>Têkildarî:</strong> Heta radeyekê têkildar. Mijar bi rûkhalî dide.<br><strong>Serbixwebûn:</strong> Mijar bi awayekî bingehîn dide. Çavkanî hindik an ne temam tên nîşandan.<br><strong>Sêwirandin:</strong> Sêwirana sade an ne diyar."},
      {grade:"4",label:"Not 4",desc:"<strong>Têkildarî:</strong> Têkildar. Xal heta radeyekê tên kûrkirin.<br><strong>Serbixwebûn:</strong> Mijar bi giştî serbixwe û afirîner dide. Naverok ji çavkaniyan heta radeyekê bi rexnegirî hatiye girêdan.<br><strong>Sêwirandin:</strong> Bi giştî sêwirana mantiqî."},
      {grade:"6",label:"Not 6",desc:"<strong>Têkildarî:</strong> Têkildar û temam. Xal baş tên kûrkirin.<br><strong>Serbixwebûn:</strong> Mijar serbixwe û rexnegir dide. Naverok ji çavkaniyan bi rexnegirî hatiye girêdan.<br><strong>Sêwirandin:</strong> Sêwirana mantiqî û minasib."}
    ]},
    {title:"Beş 3 – Formalia",items:[
      {grade:"2",label:"Not 2",desc:"<strong>Ferheng:</strong> Ferhengek bingehîn û sade. Çewtiyên di hilbijartina peyvan de dikarin ragihandinê asteng bikin.<br><strong>Hevok û rêziman:</strong> Hin avahiyên hevokan yên watedar. Hevokên netemam bi gelemperî.<br><strong>Lihevkirin û girêdan:</strong> Hindik herikîn û lihevkirin.<br><strong>Rastnivîsîn:</strong> Hindik nasîna rastnivîsînê. Çewtî dikarin ragihandinê asteng bikin."},
      {grade:"4",label:"Not 4",desc:"<strong>Ferheng:</strong> Ferhengek giştî bi hin bêjeyên minasib. Çewtî ragihandinê pir asteng nakin.<br><strong>Hevok û rêziman:</strong> Hin cihêrengî. Rêziman bi giştî rast. Xalbendî piranî piştgirî dide.<br><strong>Lihevkirin û girêdan:</strong> Herikîn û lihevkirin bi giştî. Peyvên girêdanê yên asayî.<br><strong>Rastnivîsîn:</strong> Çewtiyên hindik, kêm caran astengdêr."},
      {grade:"6",label:"Not 6",desc:"<strong>Ferheng:</strong> Ferhengek berfereh û cihêreng. Çewtiyên piçûk ragihandinê asteng nakin.<br><strong>Hevok û rêziman:</strong> Avahiyên cihêreng yên minasib. Rêziman bi giştî rast. Xalbendî piştgirî dide.<br><strong>Lihevkirin û girêdan:</strong> Herikîn û lihevkirin bi peyvên girêdanê yên cihêreng.<br><strong>Rastnivîsîn:</strong> Serweriyek baş a rastnivîsînê."}
    ]}
  ],
  tipsTitle:"Şîretên Ezmûnê",
  tips:[
    {n:1,title:"Beş 1 – Xwendin",text:"Pirsan bi baldarî bixwîne. Bîr bîne ku dikarî di navbera pirsan de pêş û paş biçî. Heke pirsek dijwar e, dikarî wê derbas bikî û pirseke din pêşî bikî."},
    {n:2,title:"Beş 2 – Veguhestin",text:"Vîdyoyê çend caran temaşe bike û bibihîze. Peyvên sereke binivîse. Bîr bîne ku dikarî vîdyoyê rawestîne û ji nû ve dest pê bike. Karê bi sê xalan bi baldarî bixwîne. Bersivê bide her sê xalan."},
    {n:3,title:"Beş 3 – Dest bi nivîsandinê bike",text:"Karê bi baldarî bixwîne berî ku dest pê bikî. Kar ji te çi dixwaze? Berî dest pê kirinê stikword û raman binivîsin. Nexşeya ramanê jî çêbike."},
    {n:4,title:"Sêwirana plansaz bike (Çarçoveya Nivîsandinê)",text:'<p style="margin-bottom:10px">Heke tu nivîseke bi çend paragraffan dinivîsî, sêwirana plansaz kirin bikêr e:</p><table class="skriveramme-table"><tr><th>Beşa nivîsê</th><th>Mînakên bi Îngilîzî</th></tr><tr><td><strong>Sernav</strong></td><td></td></tr><tr><td><strong>Destpêk</strong></td><td class="eng-example">This text will discuss…<br>The topic for this text is…<br>There are many different opinions about…<br>I believe that…</td></tr><tr><td><strong>Naveroka – Paragraf 1</strong></td><td class="eng-example">First of all…<br>To begin with…<br>Firstly, I will…</td></tr><tr><td><strong>Naveroka – Paragraf 2</strong></td><td class="eng-example">Another point is…<br>In addition…<br>Secondly…</td></tr><tr><td><strong>Naveroka – Paragraf 3</strong></td><td class="eng-example">Finally…<br>The last reason is…<br>Another example is…</td></tr><tr><td><strong>Dawî</strong></td><td class="eng-example">In conclusion…<br>To sum up…<br>In summary…</td></tr></table>'},
    {n:5,title:"Vekolîna Nivîsê",text:"Çêtir e ku dema tu dinivîsî raweste û nivîsê ji nû ve bixwîne:<br>1. Ma sernavek û destpêk heye?<br>2. Ma nivîs li paragraffan tê dabeş kirin?<br>3. Ma di nivîsê de lihevkirinek baş heye?<br>4. Ma tu peyvên girêdanê bikar tînî?<br>5. Ma dawî heye?"},
    {n:6,title:"Peyvên Girêdanê (Linking Words)",text:'<p style="margin-bottom:10px">Baş e ku bikaranîna peyvên girêdanê cûda bike:</p><table class="bindeord-table"><tr><th>Kat</th><th>Peyvên girêdanê bi Îngilîzî</th></tr><tr><td>Zêdekirin</td><td>and, also, as well as, besides, further</td></tr><tr><td>Berhevdan</td><td>in comparison, just as, similarly, likewise, on the contrary, unlike, on the other hand</td></tr><tr><td>Dijberî</td><td>but, however, in contrast to, in spite of, alternatively, although</td></tr><tr><td>Rêzik</td><td>first/firstly, second/secondly, afterwards, then, finally</td></tr><tr><td>Sedem</td><td>because, for, due to, in order to, so that</td></tr><tr><td>Encam</td><td>to conclude, in brief, so, therefore, to sum up</td></tr><tr><td>Mînak</td><td>for example, for instance, such as, like, to illustrate</td></tr></table>'},
    {n:7,title:"Lêkerên di pirsên ezmûnê de",text:'Hin lêkerên hevpar:<br><br><strong>describe</strong> (ravekirin) – Behskirina tecrube an mijarekê.<br><strong>evaluate</strong> (nirxandin) – Nirxandina aliyên cûda.<br><strong>explore</strong> (vekolîn) – Lêkolîna bi nîqaşa vekirî.<br><strong>reflect</strong> (refleks kirin) – Fikirîn û nirxandina kiryar û ramanan.<br><strong>discuss</strong> (nîqaş kirin) – Ronahiya mijarekê ji çend aliyan.'}
  ],
  faqTitle:"Pirsên Gelemperî",
  faqs:[
    {q:"Ferqa ezmûn û tentamen çi ye?",a:"Tentamen ezmûnek pratîkê ye. Nota NAYÊ hesibandin."},
    {q:"Roja amadekariyê çi ye?",a:"Rojek dibistanê ya beriya ezmûnê ye. Material ji 09:00 peyda ne. Dikarî notên xwe bîne ezmûnê lê ew ne beşek bersiva te ne."},
    {q:"Ma guhên serê lazim in?",a:"Erê. Di Beş 2 de vîdyoyekê temaşe û dibihîzî."},
    {q:"Ma dikarim Google Translate bikar bînim?",a:"Na. Destûr tune ye."},
    {q:"Ma dikarim AI bikar bînim?",a:"Na. Destûr nîne."},
    {q:"Ma dikarim ferhengê bikar bînim?",a:"Erê."},
    {q:"Kî nirxandiyê dike?",a:"Du nirxanêr bersivên te dinirxînin (Beş 2 û 3). Beş 1 bixweber tê şirovetin."},
    {q:"Çend peyv di Beş 2 de?",a:"Nêzîkî 150 peyv."},
    {q:"Çend peyv di Beş 3 de?",a:"Nêzîkî 300–700 peyv."},
    {q:"Çawa ezmûnê radestdikim?",a:"«LEVER» bikirtîne û paşê «AVSLUTT OG LEVER»."},
    {q:"Divê ez bersivê bidim her sê xalên Beş 2?",a:"Erê! Divê tu bersivê bidî her sê xalan."},
    {q:"Veguhestin çi ye di Beş 2 de?",a:"Veguhestin tê vê wateyê ku tu agahî ji vîdyoyê bi peyvên xwe veguhezî."},
    {q:"Heke wextê min têr neke çi dibe?",a:"Girîng e ku wextê baş plansaz bikî. Ji bo notek ji 1 bilindtir, divê di her sê beşan de jêhatîbûnê nîşan bidî."},
    {q:"Ma divê çavkaniyan binivîsim?",a:"Erê. Bersivên te ji bo diziya nivîsê tê kontrol kirin."},
    {q:"Ferqa describe, discuss û reflect çi ye?",a:"<strong>describe</strong> = ravekirin. <strong>discuss</strong> = nîqaş ji çend aliyan. <strong>reflect</strong> = refleks kirin, fikirîn û nîşandana têgihîştinê."}
  ]
},

  ovDuration:"5 saac",ovDurationLabel:"Guud ahaan",ovD1:"Qaybta 1",ovD1Label:"30% · 1.5s",ovD2:"Qaybta 2",ovD2Label:"30% · 1.5s",ovD3:"Qaybta 3",ovD3Label:"40% · 2s",
  p1Title:"Qaybta 1 – Akhrinta iyo Fahamka",p1Time:"Qiyaastii 1.5 saacadood",p1Weight:"30%",
  p1Desc:"Qaybta 1 waxay tijaabinaysaa xirfaddaada akhrinta waxayna ka kooban tahay su'aalo akhris oo badan. <strong>HA QORIN</strong> – dhagsii doorashada jawaabta, dhagsii ereyada qoraalka, ama jiid cutubka si ay u noqdaan kala horreynta saxda ah. Su'aalaha badan waxay ku xiriiraan mawduuca maalinta diyaarinta. Qaybta 1 si otomaatig ah ayaa loo saxaa – baarista waxay adeegsadaan natiijooyinka si ay u qiimeeyaan xirfaddaada. Su'aalo badan ayaa jira si baaristuhu u awoodaan inay qiimeeyaan xirfaddaada akhrinta.",
  p2Title:"Qaybta 2 – Gudbinta Macluumaadka iyo Isdhexgalka Qoraalka",p2Time:"Qiyaastii 1.5 saacadood",p2Weight:"30%",
  p2Desc:"Qaybta 2 waxay tijaabinaysaa awooddaada gudbinta nuxurka iyo isdhexgalka qoraalka. Qaybtan waxay ku xiriirtaa mawduuca diyaarinta. Waxaad arag oo dhegeysan doontaa video – waxaad joojixi kartaa oo dib u bilaabi kartaa. Ka dib waa inaad <strong>si kooban u gudbisaa</strong> macluumaadka iyo nuxurka waxa aad aragtay/maqashay, oo aad muujisaa inaad <strong>fikradahaaga iyo aragtidaada gaarka ah</strong> dhihi kartid. Waa inaad qortaa qiyaastii <strong>150 erey</strong>. Xusuusnow inaad <strong>saddexda dhibcood oo dhan</strong> ka jawaabtid. Qaybta 2 waxaa qiimeeyaa labo baariste.",
  p3Title:"Qaybta 3 – Qoraalka",p3Time:"Qiyaastii 2 saacadood",p3Weight:"40%",
  p3Desc:"Qaybta 3 waxay tijaabinaysaa xirfaddaada qoraalka. Waxaad dooranaysaa <strong>HAL hawl oo ka mid ah saddexda</strong> (A, B ama C). Hawlaha waxay ku xiriiraan mawduuca diyaarinta. Waxaad isticmaali kartaa macluumaad ka yimid agabka diyaarinta, aqoontaadii hore, iyo khibradahaaga gaarka ah. Waxaa laga yaabaa in lagaa codsado inaad dooddo, caddeyso sheegashooyinka iyo/ama aragtiyaha, oo aad ka fiirsatid nuxurka. Waa inaad qortaa qiyaastii <strong>300–700 erey</strong>. Hawl walba waxay leedahay tilmaamo gaar ah – muhiim ayay tahay inaad si waafaqsan ugu jawaabtid. Qaybta 3 waxaa qiimeeyaa labo baariste.",
  prepTitle:"Maalinta Diyaarinta",
  prepIntro:"Waxaa jira maalin diyaarin ka hor imtixaanka. Agabka diyaarinta waxaa la heli karaa laga bilaabo 09:00 maalinta diyaarinta. Waxaad imtixaanka keeni kartaa xusuus-qorkaaga.",
  prepItems:[

    {icon:"🤔",title:"Ka feker",desc:"Ka fikir waxa aad hore u garanaysay mawduuca iyo khibradahaaga shakhsiga ah."},

  prepNote:"Macallinku wuxuu kaa hagi karaa laakiin ma barin karo wakhtiga diyaarinta. Xirfadda aad muujinayso maalinta imtixaanka ayaa la qiimeeyaa.",
  rulesTitle:"Xeerarka Imtixaanka",
  allowedTitle:"✅ La ogol yahay",notAllowedTitle:"❌ La ogol maaha",
  allowed:["Qaamuusyada iyo buugaagta (internet la'aaan)","Qalab internetka ee iskoolka ansixiyey","Dhagadheer (loo baahan yahay Qaybta 2)","Xusuus-qorkaaga maalinta diyaarinta"],
  notAllowed:["Barnaamijyada tarjumaada (Google Translate)","Telefoonka gacanta iyo aaladaha xiriirka","AI si loo sameeyo jawaabaha","Aaladaha wada-qorista iyo chat-ka"],
  sourcesTitle:"📌 Xigashooyinka",
  sourcesDesc:"Waa inaad ku xusaa xigashooyinka aad isticmaasho. Qor magaca qoraaga iyo cinwaanka, ama ciwaanka shabakadda iyo taariikhda. Waa inay jirto farqi cad oo u dhexeeya fikradahaaga iyo waxa aad ka soo qaadatay dadka kale. Jawaabaha waxaa lagu baaraa koobiyeynta.",
  deliveryTitle:"📤 Gudbinta Maalinta Imtixaanka",
  deliveryDesc:"Jawaabaha si toos ah ayaa loo kaydiyaa. Si aad u gudbiso, dhagsii «LEVER» ka dibna «AVSLUTT OG LEVER».",
  gradesTitle:"Darajada iyo Qiimeynta",
  gradeIntro:"Labo baarista ayaa qiimeeya jawaabaha. Miisaanka darajada wuxuu u dhexeeyaa 1 ilaa 6. Si aad u hesho ka badan 1, waa inaad muujisaa xirfad saddexda qaybood oo dhan.",
  gradeScaleLabel:"Miisaanka darajada:",
  gradeWarningTitle:"⚠️ Muhiim",
  gradeWarning:"Haddii baaristuhu arkaan isbedel weyn oo ku jira qaabka qoraalka u dhexeeya Qaybta 2 iyo Qaybta 3 – tusaale ahaan haddii qaybaha qaarkoodu u muuqdaan inaysan adigu qorin – waxay saameyn kartaa qiimeyntaada.",
  gradeSections:[
    {title:"Qaybta 2 – Nuxurka iyo Qaab-dhismeedka",items:[
      {grade:"2",label:"Darajada 2",desc:"<strong>Gudbinta:</strong> Waxay gudbisaa macluumaadka si fudud. Xukumooyin madaxbanaan aad u yar.<br><strong>Isdhexgalka qoraalka:</strong> Bersiv kooban oo fudud. Aragtida gaarka ah yar. Tixraac yar.<br><strong>Qaab-dhismeed:</strong> Qaab-dhismeed fudud ama aan cad. Xiriirka qaybaha mar walba cad ma aha.<br><strong>Qaab rasmi ah:</strong> Higaad iyo calaamadaha si qayb ah sax."},
      {grade:"4",label:"Darajada 4",desc:"<strong>Gudbinta:</strong> Waxay gudbisaa macluumaadka si celcelis wanaagsan. Xukumooyin madaxbanaan xoogaa.<br><strong>Isdhexgalka qoraalka:</strong> Bersiv kooban oo ku habboon. Aragtida gaarka ah xoogaa. Tixraac xoogaa.<br><strong>Qaab-dhismeed:</strong> Inta badan qaab-dhismeed caqli-gal ah. Xiriirka inta badan cad.<br><strong>Qaab rasmi ah:</strong> Inta badan higaad iyo calaamadaha sax."},
      {grade:"6",label:"Darajada 6",desc:"<strong>Gudbinta:</strong> Waxay gudbisaa macluumaadka si aad u wanaagsan. Xukumooyin madaxbanaan badan.<br><strong>Isdhexgalka qoraalka:</strong> Bersiv kooban oo buuxa. Aragtida gaarka ah badan. Tixraac badan.<br><strong>Qaab-dhismeed:</strong> Qaab-dhismeed caqli-gal ah oo ku habboon. Xiriirka cad.<br><strong>Qaab rasmi ah:</strong> Higaad iyo calaamadaha sax, qalado yar ayaa dhici kara."}
    ]},
    {title:"Qaybta 3 – Nuxurka",items:[
      {grade:"2",label:"Darajada 2",desc:"<strong>Ku xirnaan:</strong> Xoogaa ku xiran. Mawduuca dusha saara. <br><strong>Madaxbanaanida:</strong> Si fudud u wada shaqeeyaa. Xigashooyinka yar ama aan buuxin.<br><strong>Qaab-dhismeed:</strong> Fudud ama aan cad."},
      {grade:"4",label:"Darajada 4",desc:"<strong>Ku xirnaan:</strong> Ku xiran. Qodobada xoogaa la qoto dheer yahay.<br><strong>Madaxbanaanida:</strong> Inta badan madaxbanaan oo hal-abuur leh. Xigashooyinka xoogaa si laxiriir leh loo isticmaalay.<br><strong>Qaab-dhismeed:</strong> Inta badan caqli-gal ah."},
      {grade:"6",label:"Darajada 6",desc:"<strong>Ku xirnaan:</strong> Ku xiran oo buuxa. Qodobada si wanaagsan loo qoto dheer yahay.<br><strong>Madaxbanaanida:</strong> Madaxbanaan oo dhaleeceyn leh. Xigashooyinka si laxiriir ah oo la isku halayn karo loo isticmaalay.<br><strong>Qaab-dhismeed:</strong> Caqli-gal ah oo ku habboon."}
    ]},
    {title:"Qaybta 3 – Qaab Rasmi ah",items:[
      {grade:"2",label:"Darajada 2",desc:"<strong>Erayada:</strong> Xaruuf aasaasiga ah. Qalado ereyga doorashada ah waxay carqaladayn kartaa xiriirka.<br><strong>Dhismaha xukuumada:</strong> Dhismayaal xukuumad oo qaar wax tar leh. Xukuumadaha aan dhammaystirnayn way soo noqon karaan. Calaamadaha ayaa taageeraya dhismaha si yar.<br><strong>Isku xidnaan:</strong> Xoogaa qulqulid iyo isku xidnaan oo leh isticmaal fudud ee ereyada xididdka.<br><strong>Higaadda:</strong> Xoogaa aqoon ah higaadda. Qalado waxay carqaladayn kartaa xiriirka."},
      {grade:"4",label:"Darajada 4",desc:"<strong>Erayada:</strong> Xaruuf guud oo leh ereyada idiom ee ku habboon. Qalado ayaa dhici karta laakiin xiriirka aad uma carqaladeyso.<br><strong>Dhismaha xukuumada:</strong> Kala duwanaan xoogaa. Naxwaha inta badan sax. Calaamadaha inta badan taageeraan dhismaha.<br><strong>Isku xidnaan:</strong> Qulqulid iyo isku xidnaan inta badan, oo leh ereyada xididdka ee caadiga ah.<br><strong>Higaadda:</strong> Qalado yar oo aan badanaa carqaladayn."},
      {grade:"6",label:"Darajada 6",desc:"<strong>Erayada:</strong> Xaruuf ballaaran oo kala duwan oo leh ereyada idiom ee ku habboon. Qalado yar ayaa dhici karta laakiin xiriirka ma carqaladeyso.<br><strong>Dhismaha xukuumada:</strong> Isticmaal kala duwan oo ku habboon. Naxwaha si joogto ah sax. Calaamadaha si joogto ah taageeraan.<br><strong>Isku xidnaan:</strong> Qulqulid iyo isku xidnaan oo lagu gaaray isticmaal joogto ah oo ereyada xididdka ee kala duwan.<br><strong>Higaadda:</strong> Xirfad joogto ah oo wanaagsan oo higaadda iyo qaababka ereyada."}
    ]}
  ],
  tipsTitle:"Talooyin Imtixaanka",
  tips:[
    {n:1,title:"Qaybta 1 – Akhrinta",text:"Si taxaddar leh u akhri su'aalaha. Xusuusnow inaad hore iyo gadaal u dhex mari kartid su'aalaha. Haddii su'aal adag tahay, ka bood oo mid kale samee marka hore."},
    {n:2,title:"Qaybta 2 – Gudbinta iyo Isdhexgalka",text:"Dhowr jeer u arag oo u dhegeyso video-ga. Qor erayada furaha ah intaad daawanayso. Xusuusnow inaad joojixi kartid oo dib u bilaabi kartid video-ga. Akhri hawsha leh saddexda dhibcood si taxaddar leh. Xusuusnow inaad ka jawaabtid SADDEXDA dhibcood oo dhan."},
    {n:3,title:"Qaybta 3 – Bilaw qoraalka",text:"Si taxaddar leh u akhri hawsha ka hor intaanad bilaabin. Hawshu maxay ku weydiinaysaa? Hab aad qorshayn karto qoraalkaaga waa inaad qorto erayada furaha iyo fikradaha ka hor intaanad bilaabin. Waxaad sidoo kale samayn kartaa khariidad maskax."},
    {n:4,title:"Qorshayn Qaab-dhismeedka (Qaalab Qoraalka)",text:'<p style="margin-bottom:10px">Haddii aad qorayso qoraal leh cutubyo badan, waxay faa\'iido leedahay qorshaynta qaab-dhismeedka:</p><table class="skriveramme-table"><tr><th>Qaybta qoraalka</th><th>Tusaalayaasha Ingiriisiga</th></tr><tr><td><strong>Cinwaanka</strong><br>Qor lambarka hawsha oo dooro cinwaan ku habboon.</td><td></td></tr><tr><td><strong>Hordhaca</strong><br>Sidee ayaad bilaabi doontaa qoraalka?</td><td class="eng-example">This text will discuss…<br>The topic for this text is…<br>There are many different opinions about…<br>I believe that…</td></tr><tr><td><strong>Qaybta dhexe – Cutubka 1</strong><br>Maxaad marka hore ka qori doontaa?</td><td class="eng-example">First of all…<br>To begin with…<br>Firstly, I will…</td></tr><tr><td><strong>Qaybta dhexe – Cutubka 2</strong><br>Qodobka xiga maxay tahay?</td><td class="eng-example">Another point is…<br>In addition…<br>Secondly…</td></tr><tr><td><strong>Qaybta dhexe – Cutubka 3</strong><br>Ma leedahay qodob kale?</td><td class="eng-example">Finally…<br>The last reason is…<br>Another example is…</td></tr><tr><td><strong>Gabagabo</strong><br>Sidee ayaad u dhammeysi doontaa qoraalka?</td><td class="eng-example">In conclusion…<br>To sum up…<br>In summary…</td></tr></table>'},
    {n:5,title:"Dib u eegista Qoraalka",text:"Waa fikrad wanaagsan inaad joogsato intaad qorayso oo aad akhrisato qoraalkaaga:<br>1. Ma leedahay cinwaan iyo hordhac?<br>2. Ma loo qaybiyey cutubyo?<br>3. Ma jiraa isku xidnaan wanaagsan?<br>4. Ma isticmaalaysaa ereyada xiriirka?<br>5. Ma leedahay gabagabo?"},
    {n:6,title:"Ereyada Xididdka (Linking Words)",text:'<p style="margin-bottom:10px">Waa wanaagsan inaad kala duwaneyso isticmaalka ereyada xididdka:</p><table class="bindeord-table"><tr><th>Nooca</th><th>Ereyada xididdka Ingiriisiga</th></tr><tr><td>Kudarid</td><td>and, also, as well as, besides, further</td></tr><tr><td>Isbarbardhig</td><td>in comparison, just as, similarly, likewise, on the contrary, unlike, on the other hand</td></tr><tr><td>Lid</td><td>but, however, in contrast to, in spite of, alternatively, although</td></tr><tr><td>Isku xigga</td><td>first/firstly, second/secondly, afterwards, then, finally</td></tr><tr><td>Sabab</td><td>because, for, due to, in order to, so that</td></tr><tr><td>Gabagabo</td><td>to conclude, in brief, so, therefore, to sum up</td></tr><tr><td>Tusaale</td><td>for example, for instance, such as, like, to illustrate</td></tr></table>'},
    {n:7,title:"Af-celcelinta imtixaanka",text:'Halkan waxaa ku yaal af-celcelin badanaa loo isticmaalo su\'aalaha imtixaanka:<br><br><strong>describe</strong> (sharrax) – Inaad ka sheekatid waayo-aragnimo, xaalad ama mawduuc.<br><strong>evaluate / consider</strong> (qiimee) – Inaad miisaanto dhinacyada kala duwan ee arrin.<br><strong>explore</strong> (baadhitaan) – Inaad baarato dhinacyada kala duwan ee mawduuc iyada oo loo marayo dood furan.<br><strong>reflect (on)</strong> (ka fikir) – Inaad ka fikirto oo aad baarto dhinacyada kala duwan ee ficilada, dareemayaasha iyo fikradaha.<br><strong>discuss</strong> (ka doodo) – Inaad iftiiminiso mawduuc dhinacyo badan oo aad miisaanto doodaha.'}
  ],
  faqTitle:"Su'aalaha Caanka Ah",
  faqs:[
    {q:"Farqiga imtixaanka iyo tentamen?",a:"Tentamen waa imtixaan tababar ah. Wuxuu la mid yahay imtixaanka dhabta ah laakiin darajadu MA xisaabtamiso. Imtixaanka rasmiga ah ayuu darajadaadu ku xisaabtamaa."},
    {q:"Maalinta diyaarinta maxay tahay?",a:"Maalinta diyaarinta waa maalin dugsiga ka hor imtixaanka. Agabka waxaa la heli karaa 09:00. Waxaad keeni kartaa xusuus-qorkaaga imtixaanka laakiin ma aha qayb ka mid ah jawaabta."},
    {q:"Ma u baahan tahay dhagadheer?",a:"Haa. Qaybta 2 waxaad arag oo dhegeysan doontaa video. Dhagadheer waa loo baahan yahay."},
    {q:"Ma isticmaali karaa Google Translate?",a:"Maya. Kuma ogola barnaamijyada tarjumaada imtixaanka."},
    {q:"Ma isticmaali karaa AI (tusaale ChatGPT)?",a:"Maya. Kuma ogola AI si loo sameeyo nuxurka jawaabaha."},
    {q:"Ma isticmaali karaa qaamuuska?",a:"Haa. Qaamuusyada iyo qalab internet ma u baahna waa la oggol yahay. Sidoo kale qaar ka mid ah aaladaha internetka ee iskoolka ansixiyey waa la heli karaa."},
    {q:"Cidda saxda imtixaanka?",a:"Labo baarista ayaa qiimeeya jawaabaha (Qaybta 2 iyo 3). Qaybta 1 si otomaatig ah ayaa loo saxaa."},
    {q:"Maxaa dhacaa haddii baaristuhu arkaan isbedel weyn oo ku jira qaabka qoraalka?",a:"Haddii qaybaha qaarkoodu u muuqdaan inaysan adigu qorin, waxay saameyn kartaa qiimeyntaada. Waa muhiim in waxa aad gudbiso ay tahay shaqadaada."},
    {q:"Immisa ereyood Qaybta 2?",a:"Qiyaastii 150 ereyood."},
    {q:"Immisa ereyood Qaybta 3?",a:"Qiyaastii 300–700 ereyood."},
    {q:"Ma dooran karaa hawsha Qaybta 3?",a:"Haa. Dooro hal hawl oo ka mid ah: A, B, ama C."},
    {q:"Sidee baan u gudbiyaa imtixaanka?",a:"Jawaabaha si toos ah ayaa loo kaydiyaa. Dhagsii «LEVER» ka dibna «AVSLUTT OG LEVER»."},
    {q:"Waa inaan ka jawaabaa saddexda dhibcood oo dhan Qaybta 2?",a:"Haa! Waa inaad ka jawaabtaa saddexda dhibcood oo dhan. Haddii aad qaarkood kaliya ka jawaabtid, ma muujinaysid xirfad buuxda."},
    {q:"Gudbinta maxay ka dhigan tahay Qaybta 2?",a:"Gudbinta micneheedu waa inaad dib u sheegtid ama soo koobid macluumaadka ka yimid video-ga oo aad isticmaasho erayadaada."},
    {q:"Xusuus-qorkaygii diyaarinta ma keeni karaa?",a:"Haa. Waad keeni kartaa laakiin MA aha qayb ka mid ah jawaabta imtixaankaaga."},
    {q:"Haddii waqtigu iiga dhammaado maxaa dhaca?",a:"Muhiim ayay tahay inaad si wanaagsan u qorsheysato waqtiga. Si aad u hesho ka badan darajada 1, waa inaad muujisaa xirfad saddexda qaybood oo dhan."},
    {q:"Waa inaan xigashada ku xusaa?",a:"Haa. Haddii aad isticmaasho xigashooyinka waa inaad ku xusaa si baaristuhu u helaan. Jawaabaha waxaa lagu baaraa koobiyeynta."},
    {q:"Farqiga describe, discuss iyo reflect?",a:"<strong>Describe</strong> = sharrax, ka sheekee wax. <strong>Discuss</strong> = ka doodo mawduuca dhinacyo badan. <strong>Reflect</strong> = ka fikir oo muuji fahamkaaga fikradahaaga iyo dareemayaashaaga."}
  ]
},

let lang='no', activeTab='info';

function buildLangBar(){
  const bar=document.getElementById('langBar');
  bar.innerHTML='';
  Object.keys(T).forEach(code=>{
    const btn=document.createElement('button');
    btn.className='lang-btn'+(code===lang?' active':'');
    btn.textContent=T[code].langName;
    btn.onclick=()=>setLang(code);
    bar.appendChild(btn);
  });
}

function setLang(code){
  lang=code;
  const t=T[code];
  document.documentElement.lang=code;
  document.body.classList.toggle('rtl',t.dir==='rtl');
  document.body.style.direction=t.dir;
  buildLangBar();
  renderAll();
}

function gradeColor(g){
  return{1:'#c0392b',2:'#e67e22',3:'#d4ac0d',4:'#27ae60',5:'#2980b9',6:'#8e44ad'}[g]||'#888';
}

    <div class="part-card p2"><div><div class="part-title">${t.p2Title}</div><div class="part-desc">${t.p2Desc}</div></div><div class="part-meta"><div class="part-weight" style="background:var(--orange)">${t.p2Weight}</div><div class="part-time">${t.p2Time}</div></div></div>

  `;

  // Prep
  document.getElementById('prepTitle').textContent=t.prepTitle;

    <div class="info-box purple"><div class="box-title">📌</div>${t.prepNote}</div>

  document.getElementById('gradesTitle').textContent=t.gradesTitle;

  // FAQ
  document.getElementById('faqTitle').textContent=t.faqTitle;
  document.getElementById('faqContainer').innerHTML=t.faqs.map(faq=>`
    <div class="faq-item">
      <button class="faq-q" onclick="toggleFaq(this)"><span>${faq.q}</span><span class="faq-arrow">▼</span></button>
      <div class="faq-a">${faq.a}</div>
    </div>
  `).join('');
}

function renderTabs(t){
  const tabs=[
    {id:'info',label:t.tabInfo},{id:'prep',label:t.tabPrep},
    {id:'rules',label:t.tabRules},{id:'grades',label:t.tabGrades},
    {id:'tips',label:t.tabTips},{id:'faq',label:t.tabFaq}
  ];
  document.getElementById('tabsBar').innerHTML=tabs.map(tab=>`
    <button class="tab-btn${activeTab===tab.id?' active':''}" onclick="switchTab('${tab.id}')">${tab.label}</button>
  `).join('');
}

function switchTab(tabId){
  activeTab=tabId;
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+tabId).classList.add('active');
  renderTabs(T[lang]);
  window.scrollTo({top:0,behavior:'smooth'});
}

function toggleFaq(btn){
  const ans=btn.nextElementSibling;
  const isOpen=btn.classList.contains('open');
  document.querySelectorAll('.faq-q.open').forEach(b=>{b.classList.remove('open');b.nextElementSibling.classList.remove('open');});
  if(!isOpen){btn.classList.add('open');ans.classList.add('open');}
}
